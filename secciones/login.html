<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeManager - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="login-bg">

<div class="login-card">
    <div class="text-center mb-4">
        <h1 class="h2 fw-bold mb-1">CoffeeManager</h1>
        <p class="text-muted-accessible small">Ingresá al panel administrativo corporativo</p>
    </div>
    
    <form onsubmit="event.preventDefault(); window.location.href='../index.html';">
        <div class="mb-3">
            <label class="form-label small fw-bold text-dark" id="lbl-user">USUARIO O CORREO</label>
            <input type="text" class="form-control form-control-login" aria-labelledby="lbl-user" placeholder="admin@cafeteria.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold text-dark" id="lbl-pass">CONTRASEÑA</label>
            <input type="password" class="form-control form-control-login" aria-labelledby="lbl-pass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-cafe w-100 fw-bold shadow-sm">Iniciar Sesión Comercial</button>
    </form>
</div>

</body>
</html>
