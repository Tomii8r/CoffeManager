<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeManager - Registrar Egreso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<aside id="sidebar">
    <div class="px-4 text-center text-lg-start">
        <div class="d-flex align-items-center justify-content-center justify-content-lg-start gap-2">
            <span class="material-symbols-outlined text-danger" aria-hidden="true">coffee</span>
            <h1 class="h4 fw-bold mb-0">CoffeeManager</h1>
        </div>
    </div>
    <nav class="nav flex-column gap-2 mt-4 nav-menu-responsive">
        <a class="nav-link p-3 d-flex flex-column flex-lg-row align-items-center gap-2" href="../index.html">
            <span class="material-symbols-outlined" aria-hidden="true">dashboard</span> Panel
        </a>
        <a class="nav-link p-3 d-flex flex-column flex-lg-row align-items-center gap-2" href="registrar-ingreso.html">
            <span class="material-symbols-outlined" aria-hidden="true">add_circle</span> Ingreso
        </a>
        <a class="nav-link active active-egreso p-3 d-flex flex-column flex-lg-row align-items-center gap-2" href="registrar-egreso.html">
            <span class="material-symbols-outlined" aria-hidden="true">remove_circle</span> Egreso
        </a>
        
        <div class="sidebar-footer">
            <a class="nav-link nav-link-logout p-3 d-flex flex-column flex-lg-row align-items-center gap-2" href="login.html">
                <span class="material-symbols-outlined" aria-hidden="true">logout</span> Salir
            </a>
        </div>
    </nav>
</aside>

<main id="main-content">
    <header class="bg-white border-bottom p-4">
        <h2 class="h4 fw-bold mb-0 text-danger d-flex align-items-center gap-2">
            <span class="material-symbols-outlined" aria-hidden="true">outbound</span> Registrar Gasto Extraordinario
        </h2>
    </header>

    <div class="container-fluid p-4">
        <div class="form-card">
            <form onsubmit="simularSubmit(event, '¡Gasto asentado con éxito!');">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-dark" id="lbl-monto">MONTO SALIENTE ($)</label>
                    <input type="number" class="form-control huge-input huge-input-egreso" aria-labelledby="lbl-monto" placeholder="0.00" required step="0.01">
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-dark" id="lbl-rubro">RUBRO DE GASTO</label>
                        <select class="form-select" aria-labelledby="lbl-rubro" style="height: 52px; border-radius:12px;" required>
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="granos">Logística e Insumos Crudos</option>
                            <option value="servicios">Impuestos y Servicios Fijos</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-dark" id="lbl-nota">NOTA ACLARATORIA BREVE</label>
                        <input type="text" class="form-control" aria-labelledby="lbl-nota" style="height: 52px; border-radius:12px;" placeholder="Ej: Compra de vasos descartables">
                    </div>
                </div>

                <button type="submit" class="btn btn-danger w-100 py-3 fw-bold fs-5 shadow-sm" style="border-radius:14px; background: #8c1111; border:none;">
                    Asentar Egreso Comercial
                </button>
            </form>
        </div>
    </div>
</main>

<script src="../assets/js/main.js"></script>
</body>
</html>
